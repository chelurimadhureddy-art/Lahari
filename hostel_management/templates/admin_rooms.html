{% extends 'base.html' %}

{% block title %}Manage Rooms{% endblock %}

{% block content %}
<h2>Manage Rooms</h2>
<a href="{% url 'add_room' %}" class="btn btn-primary mb-3">Add Room</a>
<table class="table">
    <thead>
        <tr>
            <th>Room Number</th>
            <th>Capacity</th>
            <th>Available Slots</th>
        </tr>
    </thead>
    <tbody>
        {% for room in rooms %}
        <tr>
            <td>{{ room.room_number }}</td>
            <td>{{ room.capacity }}</td>
            <td>{{ room.available_slots }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
