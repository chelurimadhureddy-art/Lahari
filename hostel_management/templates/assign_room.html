{% extends 'base.html' %}

{% block title %}Assign Room{% endblock %}

{% block content %}
<h2>Assign Room to {{ student.username }}</h2>
{% if profile.room %}
<p class="text-muted">Current room: <strong>{{ profile.room.room_number }}</strong></p>
{% endif %}
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label>Room</label>
        <select name="room" class="form-control" required>
            {% for room in rooms %}
            <option value="{{ room.id }}" {% if profile.room and profile.room.id == room.id %}selected{% endif %}>
                {{ room.room_number }} (Available: {{ room.available_slots }})
            </option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Assign</button>
</form>
{% endblock %}
